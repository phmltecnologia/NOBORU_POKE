<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Noboru Poke — pokes e temakis. Peça pelo site." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Noboru Poke — Pokes e temakis" />
  <meta property="og:url" content="https://noborupoke.vercel.app/" />
  <meta property="og:description" content="Monte seu poke ou peça pelo cardápio online." />
  <title>Entrar — Noboru Poke</title>
  <link rel="icon" href="material/logo_noboru.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
  <script src="js/api-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    Auth.init().then(function () {
      if (typeof Auth !== "undefined" && Auth.isLoggedIn()) {
        location.replace("index.html");
      }
    });
  </script>
</head>
<body class="auth-body">
  <div class="auth">
    <div class="auth__brand">
      <img class="auth__logo" src="img/logo_noboru.jpg" width="140" height="140" alt="" aria-hidden="true" onerror="this.onerror=null;this.src='material/logo_noboru.jpg'" />
      <h1 class="auth__title sr-only">Noboru Poke</h1>
      <p class="auth__subtitle">Pokes e temakis — acesse sua conta para fazer pedidos.</p>
      <div class="restaurant-links restaurant-links--auth" id="restaurant-links"></div>
    </div>

    <div class="auth__tabs" id="auth-tabs" role="tablist" aria-label="Acesso">
      <button type="button" class="auth__tab auth__tab--active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" data-panel="login">
        Entrar
      </button>
      <button type="button" class="auth__tab" id="tab-register" role="tab" aria-selected="false" aria-controls="panel-register" data-panel="register">
        Criar conta
      </button>
    </div>

    <div class="auth__alerts" id="auth-messages" aria-live="polite"></div>

    <div class="auth__panel" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <form class="auth__form" id="form-login" novalidate>
        <div class="field">
          <label for="login-phone" class="field__label">Telefone (WhatsApp)</label>
          <input class="field__input" type="tel" id="login-phone" name="phone" autocomplete="tel" inputmode="tel" required placeholder="(48) 99999-9999" />
        </div>
        <div class="field">
          <label for="login-birthdate" class="field__label">Data de nascimento</label>
          <input class="field__input" type="date" id="login-birthdate" name="birthDate" autocomplete="bday" required />
          <p class="field__hint">Use sua data de nascimento para entrar.</p>
        </div>
        <p class="auth__forgot">
          <button type="button" class="auth__link" id="btn-forgot-password">Esqueci minha data de nascimento</button>
        </p>
        <button type="submit" class="btn btn--primary">Entrar</button>
      </form>
    </div>

    <div class="auth__panel auth__panel--hidden" id="panel-register" role="tabpanel" aria-labelledby="tab-register" hidden>
      <form class="auth__form" id="form-register" novalidate>
        <p class="auth__sectionlabel">Dados pessoais</p>
        <div class="field-row">
          <div class="field field--half">
            <label for="reg-firstname" class="field__label">Nome</label>
            <input class="field__input" type="text" id="reg-firstname" name="firstName" autocomplete="given-name" required />
          </div>
          <div class="field field--half">
            <label for="reg-lastname" class="field__label">Sobrenome</label>
            <input class="field__input" type="text" id="reg-lastname" name="lastName" autocomplete="family-name" required />
          </div>
        </div>
        <div class="field">
          <label for="reg-phone" class="field__label">Telefone (WhatsApp)</label>
          <input class="field__input" type="tel" id="reg-phone" name="phone" autocomplete="tel" inputmode="tel" required placeholder="(48) 99999-9999" />
        </div>
        <div class="field">
          <label for="reg-birthdate" class="field__label">Data de nascimento</label>
          <input class="field__input" type="date" id="reg-birthdate" name="birthDate" autocomplete="bday" required />
          <p class="field__hint">Será usada para entrar na sua conta.</p>
        </div>

        <p class="auth__sectionlabel">Endereço</p>
        <div class="field-row">
          <div class="field field--third">
            <label for="reg-cep" class="field__label">CEP</label>
            <input class="field__input" type="text" id="reg-cep" name="cep" inputmode="numeric" autocomplete="postal-code" maxlength="9" required placeholder="00000-000" />
          </div>
          <div class="field field--grow">
            <label for="reg-street" class="field__label">Rua</label>
            <input class="field__input" type="text" id="reg-street" name="street" autocomplete="address-line1" required />
          </div>
        </div>
        <div class="field-row">
          <div class="field field--quarter">
            <label for="reg-number" class="field__label">Número</label>
            <input class="field__input" type="text" id="reg-number" name="number" autocomplete="address-line2" required />
          </div>
          <div class="field field--grow">
            <label for="reg-complement" class="field__label">Complemento</label>
            <input class="field__input" type="text" id="reg-complement" name="complement" autocomplete="address-line2" />
          </div>
        </div>
        <div class="field">
          <label for="reg-neighborhood" class="field__label">Bairro</label>
          <input class="field__input" type="text" id="reg-neighborhood" name="neighborhood" required />
        </div>
        <div class="field">
          <label for="reg-city" class="field__label">Cidade</label>
          <input class="field__input" type="text" id="reg-city" name="city" autocomplete="address-level2" required />
        </div>

        <button type="submit" class="btn btn--primary">Cadastrar e entrar</button>
      </form>
    </div>

    <div class="auth__panel auth__panel--hidden" id="panel-reset" role="tabpanel" hidden>
      <form class="auth__form" id="form-reset" novalidate>
        <p class="auth__sectionlabel">Redefinir data de nascimento</p>
        <p class="auth__hint">Informe o telefone cadastrado e defina uma nova data de nascimento (usada para entrar).</p>
        <div class="field">
          <label for="reset-phone" class="field__label">Telefone (WhatsApp)</label>
          <input class="field__input" type="tel" id="reset-phone" name="phone" autocomplete="tel" inputmode="tel" required placeholder="(48) 99999-9999" />
        </div>
        <div class="field-row">
          <div class="field field--half">
            <label for="reset-birthdate" class="field__label">Nova data de nascimento</label>
            <input class="field__input" type="date" id="reset-birthdate" name="birthDate" autocomplete="bday" required />
          </div>
          <div class="field field--half">
            <label for="reset-birthdate2" class="field__label">Confirmar data</label>
            <input class="field__input" type="date" id="reset-birthdate2" name="birthDateConfirm" autocomplete="bday" required />
          </div>
        </div>
        <button type="submit" class="btn btn--primary">Salvar nova data</button>
        <p class="auth__forgot">
          <button type="button" class="auth__link" id="reset-back">Voltar ao login</button>
        </p>
      </form>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/share-site.js"></script>
  <script src="js/restaurant-links.js"></script>
  <script src="js/phone-field.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
